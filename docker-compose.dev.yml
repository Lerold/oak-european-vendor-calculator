version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./server/src:/app/src
      - uploads:/app/uploads
    environment:
      NODE_ENV: development
      CORS_ORIGINS: http://localhost:5177,http://localhost:8082
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:8082
    command: npx tsx watch src/index.ts

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
    environment:
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-localhost}
    ports:
      - "5177:5173"
    command: npx vite --host 0.0.0.0

  nginx:
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8082:80"
